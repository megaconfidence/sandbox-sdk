name: E2E Tests

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-24.04-8core'
      worker_name_prefix:
        type: string
        required: true
        description: 'Worker name prefix (e.g., sandbox-e2e-test-worker-pr-42)'
      image_tag:
        type: string
        required: true
        description: 'Docker image tag in CF registry'
      images_changed:
        type: string
        default: 'true'
        description: 'Whether Docker images changed (controls --containers-rollout)'
      deploy_hash:
        type: string
        default: ''
        description: 'Content hash of deploy inputs (enables deploy skip via worker health check)'
      checkout_ref:
        type: string
        default: ''
        description: 'Git ref to checkout (for fork PRs via pull_request_target). Empty = default behavior.'
      checkout_repo:
        type: string
        default: ''
        description: 'Repository to checkout (for fork PRs). Empty = default behavior.'
      cache_readonly:
        type: boolean
        default: false
        description: 'When true, skip cache writes (security: prevents cache poisoning from fork PRs)'

env:
  CF_ACCOUNT_SUBDOMAIN: agents-b8a

jobs:
  deploy:
    permissions:
      contents: read
      actions: read
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    outputs:
      http-url: ${{ steps.urls.outputs.http_url }}
      ws-url: ${{ steps.urls.outputs.ws_url }}
    steps:
      - name: Check if deploy can be skipped
        if: ${{ inputs.deploy_hash != '' }}
        id: deploy-check
        run: |
          EXPECTED="${{ inputs.deploy_hash }}"

          # Check all workers — all must match to skip
          ALL_MATCH=true
          for TRANSPORT in http websocket; do
            URL="https://${{ inputs.worker_name_prefix }}-${TRANSPORT}.${{ env.CF_ACCOUNT_SUBDOMAIN }}.workers.dev/health"
            HASH=$(curl -sf --max-time 10 "$URL" 2>/dev/null | jq -r '.deploy_hash // ""' 2>/dev/null || echo "")
            if [[ "$HASH" != "$EXPECTED" ]]; then
              ALL_MATCH=false
              echo "::notice::${TRANSPORT} deploy_hash=$HASH (expected $EXPECTED)"
            fi
          done

          if [[ "$ALL_MATCH" == "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::All workers report deploy_hash=$EXPECTED — skipping deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "::notice::Deploy hash mismatch — deploying"
          fi

      # --- Capacity guard (only when deploy is needed) ---
      # Ensures enough container app headroom before deploying. Each PR
      # creates 12 container apps (2 workers × 6 classes). The account
      # has a ~100 app limit. We keep a budget of 84 (leaving 16 headroom)
      # and evict the least-recently-active PR's resources when over budget.
      # Protects: current PR, main workers, and PRs with in-progress CI.
      - uses: actions/setup-node@v6
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        with:
          node-version: 24

      - name: Install wrangler for capacity check
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        run: npm install -g wrangler@latest

      - name: Ensure container app capacity
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        run: |
          SAFE_BUDGET=84
          EXPECTED_PR_APPS=12

          CONTAINERS=$(wrangler containers list --json 2>/dev/null)
          if [ $? -ne 0 ] || [ -z "$CONTAINERS" ]; then
            echo "::error::Failed to list container apps — cannot verify capacity"
            exit 1
          fi

          TOTAL_APPS=$(echo "$CONTAINERS" | jq 'length')
          echo "Current container apps: $TOTAL_APPS / $SAFE_BUDGET budget"

          # How many apps does this PR already own?
          # Use exact prefix match with trailing dash or end-of-name to
          # avoid pr-1 matching pr-10, pr-100, etc.
          CURRENT_PR="${{ inputs.worker_name_prefix }}"
          OWN_APPS=$(echo "$CONTAINERS" | jq --arg prefix "${CURRENT_PR}-" \
            '[.[] | select(.name | startswith($prefix) or . == $prefix)] | length')
          NEEDED=$((EXPECTED_PR_APPS - OWN_APPS))
          if [ "$NEEDED" -lt 0 ]; then NEEDED=0; fi

          echo "This PR owns $OWN_APPS apps, needs $NEEDED more"

          if [ $((TOTAL_APPS + NEEDED)) -le "$SAFE_BUDGET" ]; then
            echo "Capacity OK — no eviction needed"
            exit 0
          fi

          echo "::warning::Over budget — evicting least-recently-active PR resources"

          # Extract unique PR numbers from container names using exact
          # boundary matching (word boundary after the number).
          PR_NUMS=$(echo "$CONTAINERS" | jq -r '.[].name' \
            | grep -oP 'sandbox-e2e-test-worker-pr-\K[0-9]+' | sort -un || true)

          # Extract current PR number for exclusion
          CURRENT_PR_NUM=$(echo "$CURRENT_PR" | grep -oP 'pr-\K[0-9]+$' || echo "")

          # Get PR numbers with in-progress CI to protect from eviction.
          # Uses pull_requests[].number from the workflow run API for reliable matching.
          # Queued runs are NOT protected — they haven't started using workers yet
          # and can redeploy if their warm cache is evicted.
          PROTECTED_PRS=$(gh run list --workflow=pr-privileged.yml --status=in_progress \
            --json pullRequests --jq '.[].pullRequests[].number' 2>/dev/null | sort -un || true)

          # Build list of eviction candidates with recency info
          declare -A CANDIDATES
          for PR_NUM in $PR_NUMS; do
            # Skip current PR
            if [ "$PR_NUM" = "$CURRENT_PR_NUM" ]; then continue; fi

            # Skip PRs with active CI runs
            if echo "$PROTECTED_PRS" | grep -qx "$PR_NUM" 2>/dev/null; then
              echo "Protecting PR #$PR_NUM (CI in progress)"
              continue
            fi

            # Get PR activity time for recency ranking
            UPDATED=$(gh pr view "$PR_NUM" --json updatedAt --jq '.updatedAt' 2>/dev/null || echo "1970-01-01T00:00:00Z")
            CANDIDATES["$PR_NUM"]="$UPDATED"
          done

          # Sort candidates by updatedAt (oldest first) and evict until under budget
          EVICT_ORDER=$(for PR_NUM in "${!CANDIDATES[@]}"; do
            echo "${CANDIDATES[$PR_NUM]} $PR_NUM"
          done | sort | awk '{print $2}')

          for PR_NUM in $EVICT_ORDER; do
            if [ $((TOTAL_APPS + NEEDED)) -le "$SAFE_BUDGET" ]; then
              echo "Capacity restored"
              break
            fi

            echo "Evicting PR #$PR_NUM resources"
            # Re-read live state to avoid double-counting with concurrent evictions
            LIVE_CONTAINERS=$(wrangler containers list --json 2>/dev/null || echo "[]")
            EVICTED=0
            for suffix in "-http" "-websocket"; do
              WORKER="sandbox-e2e-test-worker-pr-${PR_NUM}${suffix}"
              IDS=$(echo "$LIVE_CONTAINERS" | jq -r --arg w "$WORKER" \
                '.[] | select(.name | startswith($w)) | .id' 2>/dev/null)
              wrangler delete --name "$WORKER" 2>/dev/null || true
              for id in $IDS; do
                if wrangler containers delete "$id" 2>/dev/null; then
                  EVICTED=$((EVICTED + 1))
                fi
              done
            done
            TOTAL_APPS=$((TOTAL_APPS - EVICTED))
            echo "  Evicted $EVICTED apps (total now: $TOTAL_APPS)"
          done

          if [ $((TOTAL_APPS + NEEDED)) -gt "$SAFE_BUDGET" ]; then
            echo "::error::Cannot free enough capacity. All remaining PRs are protected (CI in progress). Retry later."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Full deploy (only when health check misses) ---

      - uses: actions/checkout@v6
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        with:
          repository: ${{ inputs.checkout_repo || github.repository }}
          ref: ${{ inputs.checkout_ref || '' }}
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@v6
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        with:
          node-version: 24

      - name: Restore npm package cache
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - uses: actions/cache/restore@v5
        id: nm-cache
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: ${{ steps.deploy-check.outputs.skip != 'true' && steps.nm-cache.outputs.cache-hit != 'true' }}

      - uses: actions/download-artifact@v8
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        with:
          name: build-${{ github.sha }}
          path: packages

      - name: Deploy and configure workers
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        run: |
          for TRANSPORT in http websocket; do
            WORKER="${{ inputs.worker_name_prefix }}-${TRANSPORT}"
            echo "::group::Deploy ${TRANSPORT} worker"
            cd tests/e2e/test-worker
            ./generate-config.sh \
              "${WORKER}" \
              "${WORKER}" \
              "${TRANSPORT}" \
              "registry:${{ inputs.image_tag }}"
            npx wrangler deploy \
              --name "${WORKER}" \
              ${{ inputs.images_changed == 'true' && '--containers-rollout immediate' || '' }}
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"

            echo "::group::Inject ${TRANSPORT} worker secrets"
            jq -n \
              --arg a "$AWS_ACCESS_KEY_ID" \
              --arg b "$AWS_SECRET_ACCESS_KEY" \
              --arg c "$CLOUDFLARE_ACCOUNT_ID" \
              --arg d "$R2_ACCESS_KEY_ID" \
              --arg e "$R2_SECRET_ACCESS_KEY" \
              --arg f "$DEPLOY_HASH" \
              '{AWS_ACCESS_KEY_ID:$a, AWS_SECRET_ACCESS_KEY:$b, CLOUDFLARE_ACCOUNT_ID:$c, R2_ACCESS_KEY_ID:$d, R2_SECRET_ACCESS_KEY:$e, DEPLOY_HASH:$f}' \
            | npx wrangler secret bulk --name "${WORKER}"
            echo "::endgroup::"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DEPLOY_HASH: ${{ inputs.deploy_hash }}

      - name: Warm container pool
        if: ${{ steps.deploy-check.outputs.skip != 'true' }}
        run: |
          CONTAINERS=$(wrangler containers list --json 2>/dev/null || echo "[]")

          for TRANSPORT in http websocket; do
            WORKER="${{ inputs.worker_name_prefix }}-${TRANSPORT}"
            APP_IDS=$(echo "$CONTAINERS" | jq -r --arg w "$WORKER" \
              '[.[] | select(.name | startswith($w))] | .[].id')
            if [ -z "$APP_IDS" ]; then
              echo "::warning::No container apps found for ${WORKER} — skipping warm pool"
              continue
            fi
            for APP_ID in $APP_IDS; do
              echo "Setting warm pool for ${WORKER} (app $APP_ID)"
              curl -sf -X PATCH \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications/${APP_ID}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"configuration":{"durable_object_offset_instances": 10}}' || echo "::warning::Failed to set warm pool for app ${APP_ID}"
            done
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Always set URLs (deterministic, needed by test jobs)
      - name: Set worker URLs
        id: urls
        run: |
          echo "http_url=https://${{ inputs.worker_name_prefix }}-http.${{ env.CF_ACCOUNT_SUBDOMAIN }}.workers.dev" >> $GITHUB_OUTPUT
          echo "ws_url=https://${{ inputs.worker_name_prefix }}-websocket.${{ env.CF_ACCOUNT_SUBDOMAIN }}.workers.dev" >> $GITHUB_OUTPUT

  test-vitest:
    permissions:
      contents: read
    needs: deploy
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - transport: http
            worker_url: http-url
            sandbox_id: e2e-http
          - transport: websocket
            worker_url: ws-url
            sandbox_id: e2e-ws
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repo || github.repository }}
          ref: ${{ inputs.checkout_ref || '' }}
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore npm package cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ github.sha }}
          path: packages
      - name: E2E tests (${{ matrix.transport }} transport)
        run: npx vitest run --config vitest.e2e.config.ts
        env:
          TEST_WORKER_URL: ${{ needs.deploy.outputs[matrix.worker_url] }}
          TEST_SANDBOX_ID: ${{ matrix.sandbox_id }}-${{ github.run_id }}
          CI: true
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  test-browser:
    permissions:
      contents: read
    needs: deploy
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repo || github.repository }}
          ref: ${{ inputs.checkout_ref || '' }}
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore npm package cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ github.sha }}
          path: packages
      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium

      # Save cache only from trusted contexts (not fork PRs via pull_request_target)
      - uses: actions/cache/save@v5
        if: steps.pw-cache.outputs.cache-hit != 'true' && !inputs.cache_readonly
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: E2E tests (browser)
        run: npx playwright test --config tests/e2e/browser/playwright.config.ts
        env:
          TEST_WORKER_URL: ${{ needs.deploy.outputs.http-url }}
          TEST_SANDBOX_ID: browser-test-${{ github.run_id }}
          CI: true
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
