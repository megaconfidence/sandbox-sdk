name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: write

env:
  CF_ACCOUNT_SUBDOMAIN: agents-b8a

jobs:
  # --- Compute content hashes for skip optimizations ---
  hashes:
    if: ${{ github.repository_owner == 'cloudflare' }}
    concurrency:
      group: release-hashes-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 1
    outputs:
      docker: ${{ steps.compute.outputs.docker }}
      deploy: ${{ steps.compute.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Compute content hashes
        id: compute
        run: |
          echo "docker=${{ hashFiles(
            'packages/sandbox/Dockerfile',
            'docker-bake.hcl',
            'docker-images.txt',
            '.dockerignore',
            'package-lock.json',
            'package.json',
            'turbo.json',
            'packages/*/package.json',
            'packages/shared/**',
            'packages/sandbox-container/**',
            'tooling/typescript-config/**',
            'biome.json',
            '.bun-version',
            'tests/e2e/test-worker/Dockerfile.*'
          ) }}" >> $GITHUB_OUTPUT
          echo "deploy=${{ hashFiles(
            'packages/sandbox/Dockerfile',
            'docker-bake.hcl',
            'docker-images.txt',
            '.dockerignore',
            'package-lock.json',
            'package.json',
            'turbo.json',
            'packages/*/package.json',
            'packages/shared/**',
            'packages/sandbox-container/**',
            'tooling/typescript-config/**',
            'biome.json',
            '.bun-version',
            'tests/e2e/test-worker/Dockerfile.*',
            'packages/sandbox/src/**',
            'tests/e2e/test-worker/**',
            'vitest.e2e.config.ts'
          ) }}" >> $GITHUB_OUTPUT

  # --- Build (always runs everything on release) ---
  build:
    needs: hashes
    if: ${{ github.repository_owner == 'cloudflare' }}
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-build.yml
    with:
      skip_docker: false
      image_tag: main
      docker_hash: ${{ needs.hashes.outputs.docker }}
    secrets: inherit

  # --- Quality gates (all checks on release) ---
  quality:
    needs: build
    concurrency:
      group: release-quality-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-quality.yml
    with:
      run_sdk_tests: true
      run_container_tests: true
      run_changeset_validation: false
    secrets: inherit

  # --- E2E tests ---
  e2e:
    needs: [hashes, build]
    concurrency:
      group: release-e2e-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/reusable-e2e.yml
    with:
      worker_name_prefix: sandbox-e2e-test-worker-main
      image_tag: main
      images_changed: ${{ needs.build.outputs.images_changed }}
      deploy_hash: ${{ needs.hashes.outputs.deploy }}
    secrets: inherit

  # --- Publish release (after all gates pass) ---
  publish-release:
    needs: [hashes, build, quality, e2e]
    if: ${{ github.repository_owner == 'cloudflare' }}
    concurrency:
      group: release-publish-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ github.sha }}
          path: packages
      - name: Install crane
        run: |
          VERSION=0.20.3
          TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -sLO "https://github.com/google/go-containerregistry/releases/download/v${VERSION}/${TARBALL}"
          curl -sLO "https://github.com/google/go-containerregistry/releases/download/v${VERSION}/checksums.txt"
          grep "${TARBALL}" checksums.txt | sha256sum -c
          tar xzf "${TARBALL}" crane
          sudo mv crane /usr/local/bin/
          rm -f "${TARBALL}" checksums.txt

      - name: Login to registries
        run: |
          source .github/cf-registry-login.sh
          cf_registry_credentials 30 '["pull", "push", "library_push"]'
          echo "$CF_REGISTRY_PASSWORD" | docker login registry.cloudflare.com \
            -u "$CF_REGISTRY_USERNAME" --password-stdin
          echo "$CF_REGISTRY_PASSWORD" | crane auth login registry.cloudflare.com \
            --password-stdin -u "$CF_REGISTRY_USERNAME"
          echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | crane auth login index.docker.io \
            --password-stdin -u "${{ secrets.DOCKER_HUB_USERNAME }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: changesets
        uses: changesets/action@v1
        with:
          version: npx tsx .github/changeset-version.ts
          publish: npx tsx .github/changeset-publish.ts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: cloudflare/sandbox
          readme-filepath: ./DOCKER_README.md
          short-description: ${{ github.event.repository.description }}

      - name: Publish Docker images to Docker Hub
        if: steps.changesets.outputs.published == 'true'
        run: |
          source .github/load-docker-images.sh
          source .github/crane-copy-retry.sh
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          VERSION="${{ needs.build.outputs.version }}"
          HASH="${{ needs.hashes.outputs.docker }}"
          SRC_TAG="ci-${HASH}"
          for image in "${DOCKER_IMAGES[@]}"; do
            [[ "$image" == "sandbox-standalone" ]] && continue  # CF registry only
            suffix="${image#sandbox}"
            crane_copy_retry \
              "${REGISTRY}/${image}:${SRC_TAG}" \
              "docker.io/cloudflare/sandbox:${VERSION}${suffix}"
          done

      - name: Publish Docker images to CF Registry Library
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        id: library-publish
        run: |
          source .github/load-docker-images.sh
          source .github/crane-copy-retry.sh
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          VERSION="${{ needs.build.outputs.version }}"
          HASH="${{ needs.hashes.outputs.docker }}"
          SRC_TAG="ci-${HASH}"
          failed=0
          for image in "${DOCKER_IMAGES[@]}"; do
            [[ "$image" == "sandbox-standalone" ]] && continue
            suffix="${image#sandbox}"
            crane_copy_retry \
              "${REGISTRY}/${image}:${SRC_TAG}" \
              "registry.cloudflare.com/library/sandbox:${VERSION}${suffix}" || failed=1
          done
          if [[ "$failed" -eq 1 ]]; then
            echo "::warning::Some images failed to publish to CF Registry Library"
            echo "## ⚠️ CF Registry Library publish partially failed" >> $GITHUB_STEP_SUMMARY
            echo "Some sandbox images could not be copied to \`registry.cloudflare.com/library/\`." >> $GITHUB_STEP_SUMMARY
            echo "Docker Hub publish was not affected." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ CF Registry Library publish succeeded" >> $GITHUB_STEP_SUMMARY
          echo "Published \`registry.cloudflare.com/library/sandbox:${VERSION}\` (+ variants)" >> $GITHUB_STEP_SUMMARY

      - name: Warn if library publish failed
        if: steps.library-publish.outcome == 'failure'
        run: |
          echo "::warning::CF Registry Library publish failed — Docker Hub and npm releases are unaffected"

      - name: Extract standalone binaries
        if: steps.changesets.outputs.published == 'true'
        run: |
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HASH="${{ needs.hashes.outputs.docker }}"
          SRC_TAG="ci-${HASH}"
          # Default variant
          docker pull "${REGISTRY}/sandbox:${SRC_TAG}"
          CID=$(docker create "${REGISTRY}/sandbox:${SRC_TAG}")
          docker cp "$CID":/container-server/sandbox ./sandbox-linux-x64
          docker rm "$CID"
          # Musl variant
          docker pull "${REGISTRY}/sandbox-musl:${SRC_TAG}"
          CID=$(docker create "${REGISTRY}/sandbox-musl:${SRC_TAG}")
          docker cp "$CID":/container-server/sandbox ./sandbox-linux-x64-musl
          docker rm "$CID"

      - name: Upload binaries to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          sha256sum sandbox-linux-x64 > sandbox-linux-x64.sha256
          sha256sum sandbox-linux-x64-musl > sandbox-linux-x64-musl.sha256
          gh release upload "@cloudflare/sandbox@${VERSION}" \
            ./sandbox-linux-x64 ./sandbox-linux-x64.sha256 \
            ./sandbox-linux-x64-musl ./sandbox-linux-x64-musl.sha256 \
            --clobber
