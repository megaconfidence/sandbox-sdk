name: Cleanup

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pull-requests: read

jobs:
  # --- PR close: backstop cleanup for anything per-run cleanup missed ---
  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Delete registry images
        timeout-minutes: 2
        continue-on-error: true
        run: |
          PR=${{ github.event.pull_request.number }}
          for image in sandbox sandbox-python sandbox-opencode sandbox-standalone sandbox-musl sandbox-desktop; do
            wrangler containers images delete "$image:pr-$PR" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete GHA caches
        timeout-minutes: 1
        continue-on-error: true
        run: gh cache delete --all --ref "refs/pull/${{ github.event.pull_request.number }}/merge" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete test workers and containers
        timeout-minutes: 3
        continue-on-error: true
        run: |
          PR=${{ github.event.pull_request.number }}
          CONTAINERS=$(wrangler containers list --json 2>/dev/null || echo "[]")

          for suffix in "-http" "-websocket"; do
            WORKER="sandbox-e2e-test-worker-pr-${PR}${suffix}"
            IDS=$(echo "$CONTAINERS" | jq -r ".[] | select(.name | startswith(\"$WORKER\")) | .id" 2>/dev/null)
            wrangler delete --name "$WORKER" 2>/dev/null || true
            for id in $IDS; do
              wrangler containers delete "$id" 2>/dev/null || true
            done
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # --- Daily sweep: catch anything per-run or PR-close cleanup missed ---
  cleanup-stale:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Clean stale resources
        timeout-minutes: 10
        run: |
          CONTAINERS=$(wrangler containers list --json 2>/dev/null || echo "[]")
          PR_NUMBERS=$(echo "$CONTAINERS" | jq -r '.[].name' 2>/dev/null \
            | grep -oE 'pr-[0-9]+' | sed 's/pr-//' | sort -u)

          STALE_THRESHOLD=$((7 * 24 * 60 * 60))
          NOW=$(date +%s)
          declare -A SHOULD_CLEAN

          for PR in $PR_NUMBERS; do
            PR_INFO=$(gh pr view "$PR" --json state,updatedAt 2>/dev/null || echo "")
            if [ -z "$PR_INFO" ]; then
              SHOULD_CLEAN[$PR]=true
              continue
            fi
            STATE=$(echo "$PR_INFO" | jq -r '.state')
            if [ "$STATE" = "CLOSED" ] || [ "$STATE" = "MERGED" ]; then
              SHOULD_CLEAN[$PR]=true
            elif [ "$STATE" = "OPEN" ]; then
              UPDATED=$(echo "$PR_INFO" | jq -r '.updatedAt')
              UPDATED_EPOCH=$(date -d "$UPDATED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$UPDATED" +%s 2>/dev/null)
              if [ $((NOW - UPDATED_EPOCH)) -gt $STALE_THRESHOLD ]; then
                SHOULD_CLEAN[$PR]=true
              else
                SHOULD_CLEAN[$PR]=false
              fi
            fi
          done

          for PR in $PR_NUMBERS; do
            if [ "${SHOULD_CLEAN[$PR]}" = "true" ]; then
              echo "PR #$PR is stale — cleaning up"
              for suffix in "-http" "-websocket"; do
                WORKER="sandbox-e2e-test-worker-pr-${PR}${suffix}"
                IDS=$(echo "$CONTAINERS" | jq -r ".[] | select(.name | startswith(\"$WORKER\")) | .id" 2>/dev/null)
                wrangler delete --name "$WORKER" 2>/dev/null || true
                for id in $IDS; do
                  wrangler containers delete "$id" 2>/dev/null || true
                done
              done
              for image in sandbox sandbox-python sandbox-opencode sandbox-standalone sandbox-musl sandbox-desktop; do
                wrangler containers images delete "$image:pr-$PR" || true
              done
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean stale GHA caches
        timeout-minutes: 2
        run: |
          CACHES=$(gh cache list --json ref -q '.[].ref' 2>/dev/null || echo "")
          echo "$CACHES" | grep -E 'refs/pull/[0-9]+/merge' | while read -r REF; do
            PR=$(echo "$REF" | grep -oE '[0-9]+')
            STATE=$(gh pr view "$PR" --json state -q '.state' 2>/dev/null || echo "NOT_FOUND")
            if [ "$STATE" = "CLOSED" ] || [ "$STATE" = "MERGED" ] || [ "$STATE" = "NOT_FOUND" ]; then
              gh cache delete --all --ref "$REF" || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
