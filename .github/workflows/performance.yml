name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cold-start
          - sustained-throughput
          - bursty-traffic
          - concurrent-creation
          - burst-startup
          - file-io
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_ACCOUNT_SUBDOMAIN: agents-b8a
  PERF_WORKER_NAME: sandbox-perf-test-worker

jobs:
  setup:
    runs-on: ubuntu-24.04-8core
    timeout-minutes: 15
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/cache/save@v5
        if: steps.nm-cache.outputs.cache-hit != 'true'
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Build packages
        run: npm run build

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sandbox/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: |
            packages/sandbox/dist/
            packages/shared/dist/
          retention-days: 1

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (for build cache)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> $GITHUB_OUTPUT

      - name: Build default Docker image
        uses: docker/bake-action@v6
        env:
          TAG: perf
          SANDBOX_VERSION: ${{ steps.version.outputs.version }}
          CACHE_REPO: ghcr.io/${{ github.repository }}/cache
          BUN_VERSION: ${{ steps.bun-version.outputs.version }}
        with:
          files: docker-bake.hcl
          targets: default
          load: true

      - name: Push image to CF registry
        run: npx wrangler containers push sandbox:perf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate wrangler config
        run: |
          cd tests/e2e/test-worker
          sed -e "s|{{WORKER_NAME}}|${{ env.PERF_WORKER_NAME }}|g" \
            -e "s|{{CONTAINER_NAME}}|${{ env.PERF_WORKER_NAME }}|g" \
            -e "s|{{IMAGE_SANDBOX}}|registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/sandbox:perf|g" \
            wrangler.perf.template.jsonc > wrangler.jsonc

      - name: Deploy test worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ env.PERF_WORKER_NAME }}
          workingDirectory: tests/e2e/test-worker

      - name: Set worker URL
        id: deploy
        run: |
          echo "worker_url=https://${{ env.PERF_WORKER_NAME }}.${{ env.CF_ACCOUNT_SUBDOMAIN }}.workers.dev" >> $GITHUB_OUTPUT

  performance-tests:
    needs: setup
    runs-on: ubuntu-24.04-8core
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ github.sha }}
          path: packages

      - name: Create output directory
        run: mkdir -p perf-results

      - name: Run performance tests
        env:
          TEST_WORKER_URL: ${{ needs.setup.outputs.worker_url }}
          CI: true
          PERF_RUN_ID: ${{ github.run_id }}
        run: |
          if [ "${{ inputs.scenario }}" = "all" ] || [ -z "${{ inputs.scenario }}" ]; then
            npm run test:perf
          else
            npx vitest run --config vitest.perf.config.ts "tests/perf/scenarios/${{ inputs.scenario }}.test.ts"
          fi

      - name: Upload performance results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-results-${{ github.run_id }}
          path: perf-results/
          retention-days: 7

      - name: Upload baseline
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: perf-baseline
          path: perf-results/latest.json
          retention-days: 7

      - name: Ingest results into D1
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PERF_D1_DATABASE_ID: ${{ secrets.PERF_D1_DATABASE_ID }}
          PERF_D1_RETENTION_DAYS: 90
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: npx tsx tests/perf/scripts/ingest-to-d1.ts perf-results/latest.json

      - name: Call notifier webhook
        if: always() && secrets.PERF_NOTIFIER_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.PERF_NOTIFIER_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.PERF_NOTIFIER_API_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.PERF_CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.PERF_CF_ACCESS_CLIENT_SECRET }}
        run: |
          curl -sf -X POST "$WEBHOOK_URL/api/notify" \
            -H "Authorization: Bearer $WEBHOOK_SECRET" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"run_id": "perf-${{ github.run_id }}"}'
