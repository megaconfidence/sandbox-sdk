name: Build

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-24.04-8core'
      skip_docker:
        type: boolean
        default: false
        description: 'Skip Docker image builds (SDK-only, docs-only changes)'
      image_tag:
        type: string
        required: true
        description: 'Docker image tag (e.g., pr-42, main)'
      docker_hash:
        type: string
        default: ''
        description: 'Content hash of Docker build inputs (enables content-addressed skip)'
      checkout_ref:
        type: string
        default: ''
        description: 'Git ref to checkout (for fork PRs via pull_request_target). Empty = default behavior.'
      checkout_repo:
        type: string
        default: ''
        description: 'Repository to checkout (for fork PRs). Empty = default behavior.'
      cache_readonly:
        type: boolean
        default: false
        description: 'When true, skip cache writes (security: prevents cache poisoning from fork PRs)'
    outputs:
      version:
        description: 'Package version from package.json'
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    concurrency:
      group: docker-${{ inputs.docker_hash || github.run_id }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repo || github.repository }}
          ref: ${{ inputs.checkout_ref || '' }}
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: ${{ !inputs.cache_readonly && 'npm' || '' }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      # Save cache only from trusted contexts (not fork PRs via pull_request_target)
      - uses: actions/cache/save@v5
        if: steps.nm-cache.outputs.cache-hit != 'true' && !inputs.cache_readonly
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Build packages
        run: npx turbo run build

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sandbox/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload JS build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: |
            packages/sandbox/dist/
            packages/shared/dist/
          retention-days: 1

      # --- Docker build (conditional, with content-addressed skip) ---

      - name: Install crane
        if: ${{ !inputs.skip_docker }}
        run: |
          VERSION=0.20.3
          TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -sLO "https://github.com/google/go-containerregistry/releases/download/v${VERSION}/${TARBALL}"
          curl -sLO "https://github.com/google/go-containerregistry/releases/download/v${VERSION}/checksums.txt"
          grep "${TARBALL}" checksums.txt | sha256sum -c
          tar xzf "${TARBALL}" crane
          sudo mv crane /usr/local/bin/
          rm -f "${TARBALL}" checksums.txt

      - name: Login to CF registry (crane)
        if: ${{ !inputs.skip_docker }}
        id: cf-auth
        run: |
          CREDS=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/containers/registries/registry.cloudflare.com/credentials" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"expiration_minutes": 15, "permissions": ["pull", "push"]}')
          USERNAME=$(echo "$CREDS" | jq -r '.result.username')
          PASSWORD=$(echo "$CREDS" | jq -r '.result.password')
          echo "$PASSWORD" | crane auth login registry.cloudflare.com --password-stdin -u "$USERNAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check registry for existing images
        if: ${{ !inputs.skip_docker && inputs.docker_hash != '' }}
        id: registry-check
        run: |
          source .github/load-docker-images.sh
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HASH="${{ inputs.docker_hash }}"
          ALL_HIT=true
          for image in "${DOCKER_IMAGES[@]}"; do
            if ! crane digest "${REGISTRY}/${image}:ci-${HASH}" >/dev/null 2>&1; then
              ALL_HIT=false
              echo "::notice::Missing image ${image}:ci-${HASH} — full build required"
              break
            fi
          done
          if [[ "$ALL_HIT" == "true" ]]; then
            echo "hit=true" >> $GITHUB_OUTPUT
            echo "::notice::All Docker images found in registry for ci-${HASH} — skipping build"
          else
            echo "hit=false" >> $GITHUB_OUTPUT
            echo "::notice::Cache miss for ci-${HASH} — building fresh"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Retag cached images for this PR
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit == 'true' }}
        run: |
          source .github/load-docker-images.sh
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HASH="${{ inputs.docker_hash }}"
          TAG="${{ inputs.image_tag }}"
          pids=()
          for image in "${DOCKER_IMAGES[@]}"; do
            crane copy "${REGISTRY}/${image}:ci-${HASH}" "${REGISTRY}/${image}:${TAG}" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do wait "$pid"; done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # --- Full Docker build (only when registry miss) ---

      - name: Set up Docker Buildx
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (for build cache)
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> $GITHUB_OUTPUT

      - name: Build Docker images (bake)
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        uses: docker/bake-action@v6
        env:
          TAG: ${{ inputs.image_tag }}
          SANDBOX_VERSION: ${{ steps.version.outputs.version }}
          CACHE_REPO: ghcr.io/${{ github.repository }}/cache
          BUN_VERSION: ${{ steps.bun-version.outputs.version }}
        with:
          files: docker-bake.hcl
          source: .
          targets: main
          load: true

      - name: Push base image to CF registry
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        run: npx wrangler containers push sandbox:${{ inputs.image_tag }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build standalone image
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        run: |
          docker buildx build \
            --build-arg BASE_IMAGE=registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/sandbox:${{ inputs.image_tag }} \
            --load -t sandbox-standalone:${{ inputs.image_tag }} \
            -f tests/e2e/test-worker/Dockerfile.standalone tests/e2e/test-worker

      - name: Push remaining images to CF registry
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' }}
        run: |
          source .github/load-docker-images.sh
          TAG="${{ inputs.image_tag }}"
          pids=()
          for image in "${DOCKER_IMAGES[@]}"; do
            [[ "$image" == "sandbox" ]] && continue  # base image already pushed
            npx wrangler containers push "${image}:${TAG}" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do wait "$pid"; done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag images with content hash
        if: ${{ !inputs.skip_docker && steps.registry-check.outputs.hit != 'true' && inputs.docker_hash != '' }}
        run: |
          source .github/load-docker-images.sh
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HASH="${{ inputs.docker_hash }}"
          TAG="${{ inputs.image_tag }}"
          pids=()
          for image in "${DOCKER_IMAGES[@]}"; do
            crane copy "${REGISTRY}/${image}:${TAG}" "${REGISTRY}/${image}:ci-${HASH}" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do wait "$pid"; done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
